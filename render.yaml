services:
  - type: web
    name: finfamily-bank-scraper
    env: docker
    region: frankfurt
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: API_SECRET_KEY
        sync: false
      - key: ADMIN_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
    healthCheckPath: /health
