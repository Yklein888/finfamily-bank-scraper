name: Hourly Bank Sync

on:
  schedule:
    - cron: '0 * * * *'  # כל שעה
  workflow_dispatch:     # + לחצן ידני

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run Pagi Scraper (Hourly Sync)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PAGI_USERNAME: ${{ secrets.PAGI_USERNAME }}
          PAGI_PASSWORD: ${{ secrets.PAGI_PASSWORD }}
        run: node scripts/local-scrape.js

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-logs
          path: ./logs/
          retention-days: 7
