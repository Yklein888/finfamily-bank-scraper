name: FinFamily Auto Scraper

on:
  schedule:
    # כל 6 שעות
    - cron: '0 */6 * * *'
  workflow_dispatch: # אפשר גם להריץ ידנית

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Find Chrome and set path
        id: chrome
        run: |
          CHROME=$(which google-chrome-stable 2>/dev/null || which google-chrome 2>/dev/null || which chromium-browser 2>/dev/null || which chromium 2>/dev/null || echo "")
          if [ -z "$CHROME" ]; then
            echo "Chrome not found, installing chromium..."
            sudo apt-get update -qq && sudo apt-get install -y -qq chromium-browser
            CHROME=$(which chromium-browser)
          fi
          echo "Using Chrome: $CHROME"
          echo "CHROME_PATH=$CHROME" >> $GITHUB_OUTPUT

      - name: Run Pagi scraper
        env:
          SUPABASE_URL: https://tzhhilhiheekhcpdexdc.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
          PAGI_USERNAME: ${{ secrets.PAGI_USERNAME }}
          PAGI_PASSWORD: ${{ secrets.PAGI_PASSWORD }}
          PUPPETEER_EXECUTABLE_PATH: ${{ steps.chrome.outputs.CHROME_PATH }}
        run: node scripts/scrape-pagi.js

      - name: Run Cal scraper
        if: always()
        env:
          SUPABASE_URL: https://tzhhilhiheekhcpdexdc.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
          CAL_USERNAME: ${{ secrets.CAL_USERNAME }}
          CAL_PASSWORD: ${{ secrets.CAL_PASSWORD }}
          PUPPETEER_EXECUTABLE_PATH: ${{ steps.chrome.outputs.CHROME_PATH }}
        run: node scripts/scrape-cal.js

      - name: Run Hapoalim scraper
        if: always()
        env:
          SUPABASE_URL: https://tzhhilhiheekhcpdexdc.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
          HAPOALIM_USERCODE: ${{ secrets.HAPOALIM_USERCODE }}
          HAPOALIM_PASSWORD: ${{ secrets.HAPOALIM_PASSWORD }}
          PUPPETEER_EXECUTABLE_PATH: ${{ steps.chrome.outputs.CHROME_PATH }}
        run: node scripts/scrape-hapoalim.js

      - name: Log completion
        if: always()
        run: |
          echo "✅ Scrape cycle completed at $(date)"
